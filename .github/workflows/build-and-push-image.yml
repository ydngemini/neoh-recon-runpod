name: build-and-push-image

# Builds the reconstruction container and publishes it to GHCR so any GPU
# provider (OnCompute, etc.) can pull it without RunPod's private registry.
# Uses the built-in GITHUB_TOKEN (packages: write) — no PAT needed.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - pipeline.sh
      - requirements.txt
      - .github/workflows/build-and-push-image.yml
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Reclaim disk space (CUDA + torch image is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo docker builder prune -af || true
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/ydngemini/neoh-recon-runpod:latest
            ghcr.io/ydngemini/neoh-recon-runpod:${{ github.sha }}
